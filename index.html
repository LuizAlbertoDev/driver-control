<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Driver Control - Controle financeiro para motoristas de aplicativo" />
    <title>Driver Control</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

    <link rel="stylesheet" href="assets/css/reset.css" />
    <link rel="stylesheet" href="assets/css/variables.css" />
    <link rel="stylesheet" href="assets/css/main.css" />
  </head>
  <body>
    <header class="header">
      <div class="header__logo">
        <img src="assets/img/logo.svg" alt="Driver Control" height="48" />
      </div>
      
      <nav class="header__nav">
        <a href="index.html">
          <i class="fa-solid fa-chart-simple"></i> Dashboard
        </a>
        <a href="pages/earnings.html">
          <i class="fa-solid fa-money-bill-trend-up"></i> Ganhos
        </a>
        <a href="pages/expenses.html">
          <i class="fa-solid fa-receipt"></i> Despesas
        </a>
        <a href="pages/maintenance.html">
          <i class="fa-solid fa-screwdriver-wrench"></i> Manutenção
        </a>
      </nav>
    </header>

    <main class="main">
      <section class="dashboard">
        <h2 class="dashboard__title">Resumo</h2>
        <span class="card__info">Este mês</span>

        <div class="dashboard__cards">
          <div class="card card--success">
              <span class="card__label">Ganho total</span>
              <strong class="card__value" id="total-ganhos">R$ 0,00</strong>
              <span class="card__info">Todos os registros</span>
          </div>

          <div class="card card--danger">
              <span class="card__label">Gasto total</span>
              <strong class="card__value" id="total-despesas">R$ 0,00</strong>
              <span class="card__info">Todos os registros</span>
          </div>

          <div class="card card--warning">
              <span class="card__label">Lucro líquido</span>
              <strong class="card__value" id="lucro-liquido">R$ 0,00</strong>
              <span class="card__info">Ganhos - Despesas</span>
          </div>

          <div class="card card--warning">
              <span class="card__label">Km rodados</span>
              <strong class="card__value" id="km-rodados">0 km</strong>
              <span class="card__info">Total acumulado</span>
          </div>

          </div> <div class="dashboard__maintenance" style="margin-top: var(--spacing-xl);">
            <h3 class="dashboard__title" style="font-size: 1.4rem; margin-bottom: var(--spacing-md);">
              <i class="fa-solid fa-triangle-exclamation" style="color: var(--color-warning);"></i> Atenção na Manutenção
            </h3>
            <div id="dashboard-maintenance-status" class="status-container"></div>
          </div>

        </div>
      </section>
    </main>

    <footer class="footer">
        <p>&copy; 2025 Driver Control. Desenvolvido por Luiz Alberto.</p>
    </footer>

    <script src="assets/js/storage.js"></script>
    <script src="assets/js/dashboard.js"></script>
    <script src="assets/js/app.js"></script>
  </body>
</html>
