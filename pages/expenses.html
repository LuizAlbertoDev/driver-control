<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Despesas — Driver Control</title>
    <link rel="stylesheet" href="../assets/css/reset.css" />
    <link rel="stylesheet" href="../assets/css/variables.css" />
    <link rel="stylesheet" href="../assets/css/main.css" />
  </head>
  <body>

    <header class="header">
        <div class="header__logo">
            <img src="../assets/img/logo.svg" alt="Driver Control" height="48" />
        </div>
      <nav class="header__nav">
        <a href="../index.html">Dashboard</a>
        <a href="earnings.html">Ganhos</a>
        <a href="expenses.html">Despesas</a>
        <a href="maintenance.html">Manutenção</a>
      </nav>
    </header>

    <main class="main">
      <h2>Despesas</h2>

      <section class="expenses">
        <h3>Registrar Despesa</h3>

        <form class="expenses-form" id="expenses-form">

          <div class="form-group">
            <label for="date">Data</label>
            <input type="date" id="date" name="date" required />
          </div>

          <div class="form-group">
            <label for="categoria">Categoria</label>
            <select id="categoria" name="categoria" required>
                <option value="combustivel">Combustível</option>
                <option value="alimentacao">Alimentação</option>
                <option value="pedagio">Pedágio</option>
                <option value="lavagem">Lavagem</option>
                <option value="estacionamento">Estacionamento</option>
                <option value="manutencao">Manutenção</option>
                <option value="outros">Outros</option>
            </select>
          </div>

          <div class="form-group">
            <label for="valor-despesa">Valor (R$)</label>
            <input type="number" id="valor-despesa" name="valor-despesa" min="0" step="0.1" placeholder="0" required />
          </div>

          <div class="form-group">
            <label for="descricao-despesa">Descrição</label>
            <input type="text" id="descricao-despesa" name="descricao-despesa" placeholder="Posto Shell, Lavagem, etc." required />
          </div>

          <div class="form-group">
            <label for="kmAtualVeiculo">Km atual do veículo</label>
            <input type="number" id="kmAtualVeiculo" name="kmAtualVeiculo" min="0" step="0.01" placeholder="0,00" required />
          </div>

          <button type="submit" class="btn btn--primary">Salvar registro</button>

        </form>

        <section class="expenses-list">
          <h3>Registros</h3>
          <div id="expenses-list">
            <!-- os registros vão aparecer aqui via JavaScript -->
          </div>
        </section>
      </section>
    </main>

    <footer class="footer">
      <p>&copy; 2025 Driver Control. Desenvolvido por Luiz Alberto.</p>
    </footer>

    <script src="../assets/js/storage.js"></script>
    <script src="../assets/js/expenses.js"></script>
    <script src="../assets/js/app.js"></script>
  </body>
</html>
