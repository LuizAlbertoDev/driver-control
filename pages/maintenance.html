<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manutenção — Driver Control</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="../assets/css/reset.css" />
    <link rel="stylesheet" href="../assets/css/variables.css" />
    <link rel="stylesheet" href="../assets/css/main.css" />
  </head>
  <body>

    <header class="header">
        <div class="header__logo">
            <img src="../assets/img/logo.svg" alt="Driver Control" height="48" />
        </div>
      <nav class="header__nav">
        <a href="../index.html">
          <i class="fa-solid fa-chart-simple"></i> Dashboard
        </a>
        <a href="earnings.html">
          <i class="fa-solid fa-money-bill-trend-up"></i> Ganhos
        </a>
        <a href="expenses.html">
          <i class="fa-solid fa-receipt"></i> Despesas
        </a>
        <a href="maintenance.html">
          <i class="fa-solid fa-screwdriver-wrench"></i> Manutenção
        </a>
      </nav>
    </header>

    <main class="main">
      <h2>Manutenção</h2>

      <div class="page-grid">
        
        <div>
          <form class="form-card" id="maintenance-form">
            <h3 style="margin-bottom: var(--spacing-md);">Registrar Manutenção de Peça</h3>

            <div class="form-group">
              <label for="date">Data</label>
              <input type="date" id="date" name="date" required />
            </div>

            <div class="form-group">
              <label for="peca">Peça</label>
              <select id="peca" name="peca" required>
                  <option value="">Selecione uma peça</option>
              </select>
            </div>

            <div class="form-group">
              <label for="valor-despesa">Valor (R$)</label>
              <input type="number" id="valor-despesa" name="valor-despesa" min="0" step="0.1" placeholder="0" required />
            </div>

            <div class="form-group">
              <label for="kmAtualVeiculo">Km atual do veículo</label>
              <input type="number" id="kmAtualVeiculo" name="kmAtualVeiculo" min="0" step="0.01" placeholder="0,00" required />
            </div>

            <button type="submit" class="btn btn--primary">Salvar registro</button>
          </form>
        </div>

        <section class="maintenance-list">
            <div class="status-panel" style="margin-bottom: var(--spacing-xl);">
              <h3>Status das Peças</h3>
              <div id="maintenance-status" class="status-container"></div>
            </div>

            <hr style="border: 0; border-top: 1px solid rgba(0,0,0,0.1); margin: var(--spacing-lg) 0;" />

            <h3>Histórico de Registros</h3>
            <div id="maintenance-list"></div>
        </section>

      </div>
    </main>

    <footer class="footer">
      <p>&copy; 2025 Driver Control. Desenvolvido por Luiz Alberto.</p>
    </footer>

    <script src="../assets/js/storage.js"></script>
    <script src="../assets/js/maintenance.js"></script>
    <script src="../assets/js/app.js"></script>
  </body>
</html>
